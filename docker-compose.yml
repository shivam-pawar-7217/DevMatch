

services:
  db:
    image: postgres:15-alpine
    container_name: devmatch-db
    environment:
      POSTGRES_USER: devmatch_user
      POSTGRES_PASSWORD: devmatch_pass
      POSTGRES_DB: devmatch_db
    volumes:
      # This pulls in the 01_schema.sql and 02_seed.sql
      - ./db:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - jtp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmatch_user -d devmatch_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: devmatch-backend
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: devmatch_db
      DB_USER: devmatch_user
      DB_PASSWORD: devmatch_pass
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - jtp-network

  frontend:
    build: ./frontend
    container_name: devmatch-frontend
    ports:
      - "3000:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - jtp-network

volumes:
  pgdata:

networks:
  jtp-network:
    driver: bridge
